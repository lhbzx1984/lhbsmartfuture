version: '3.8'

services:
  kacey-ai:
    build: .
    ports:
      - "3000:3000"
    environment:
      - RIGHTCODES_API_KEY=${RIGHTCODES_API_KEY}
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/config-status"]
      interval: 30s
      timeout: 10s
      retries: 3